<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVUIX | Game Vault</title>
   
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple: #bc13fe;
            --purple-glow: rgba(188, 19, 254, 0.5);
            --dark-bg: #050208;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(188, 19, 254, 0.2);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 99;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            background: radial-gradient(circle at top center, #1a0b2e 0%, #050208 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .experimental-banner {
            width: 100%;
            background: rgba(188, 19, 254, 0.1);
            border-bottom: 1px solid var(--purple);
            padding: 10px 0;
            font-size: 0.8rem;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .experimental-banner a {
            color: var(--purple);
            font-weight: bold;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 8px 20px;
