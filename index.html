<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avuix Official | The Hub</title>
    <style>
        /* Modern Dark Theme */
        body {
            background-color: #0b0b0b;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Main Card */
        .container {
            text-align: center;
            padding: 50px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            max-width: 400px;
            width: 90%;
        }

        /* Avuix Brand Color (Teal/Neon) */
        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        p {
            color: #777;
            font-size: 1rem;
            margin-top: 10px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* The "Launch" Button */
        .btn {
            display: inline-block;
            background-color: #00ffcc;
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }

        /* Status Light */
        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #00ffcc;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AVUIX</h1>
        <p>Operation: Resurgence</p>
        
        <a href="#" class="btn">INITIALIZE TEST</a>

        <div class="status">
            <span class="dot"></span>
            SYSTEMS ONLINE
        </div>
    </div>

</body>
</html>
