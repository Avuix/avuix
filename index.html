<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avuix© Games | Ghub</title>
    <style>
        :root {
            --brand-color: #00ffcc;
            --bg-dark: #0b0b0b;
            --card-bg: #161616;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Navigation Bar - Just like Google Sites */
        nav {
            background: rgba(20, 20, 20, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--brand-color);
            letter-spacing: 2px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #111, var(--bg-dark));
        }

        .hero h1 {
            font-size: 3rem;
            margin: 0;
        }

        /* The Game Grid */
        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* Individual Game Card */
        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #222;
            text-align: center;
            text-decoration: none;
            color: white;
        }
