<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code.org Math Homework Button</title>
    <style>
        body { font-family: Arial, sans-serif; }
        button { padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Math Homework</h1>
    <button id="homeworkButton">Start Homework</button>
    <script>
        document.getElementById('homeworkButton').onclick = function() {
            window.open('https://code.org', '_blank');
        };
    </script>
</body>
</html>
