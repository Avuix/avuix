<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AVUIX Game Library - 400+ unblocked games with intelligent categorization and search">
    <title>🎮 AVUIX | Games </title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .games-header {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 0.8s ease;
        }

        .games-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            color: var(--purple);
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .games-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: rgba(188, 19, 254, 0.08);
            border: 1px solid rgba(188, 19, 254, 0.2);
            border-radius: 20px;
            animation: slideDown 0.8s ease;
        }

        #searchInput {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(188, 19, 254, 0.4);
            color: white;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #searchInput::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #searchInput:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(188, 19, 254, 0.7);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
            padding-left: 30px;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid rgba(188, 19, 254, 0.3);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(188, 19, 254, 0.25);
            border-color: rgba(188, 19, 254, 0.6);
            color: white;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 40px 0;
            padding: 0 15px;
            animation: fadeIn 0.8s ease 0.2s both;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.15), rgba(188, 19, 254, 0.05));
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 140px;
            position: relative;
            overflow: hidden;
            group: 1;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.3), rgba(188, 19, 254, 0.15));
            border-color: rgba(188, 19, 254, 0.6);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
            transform: translateY(-8px) scale(1.05);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.3;
            word-break: break-word;
            margin: 0;
            position: relative;
            z-index: 2;
        }

        .game-category-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65rem;
            padding: 4px 10px;
            background: rgba(188, 19, 254, 0.6);
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .game-count {
            text-align: center;
            margin: 20px 0;
            font-size: 0.9rem;
            color: rgba(188, 19, 254, 0.7);
            letter-spacing: 2px;
        }

        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 10px;
            }

            #searchInput {
                font-size: 0.9rem;
            }

            .filter-section {
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 8px;
            }

            .game-card {
                min-height: 120px;
                padding: 12px;
            }

            .game-title {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">🎮 AVUIX</h1>
        <nav>
            <a href="../index.html">🏠 HOME</a>
            <a href="hub.html" style="color: white; text-shadow: 0 0 10px var(--purple);">🎮 GAMES</a>
            <a href="proxies.html">🌐 PROXIES</a>
            
            <div class="dropdown">
                <span class="dropbtn">📋 MORE ▾</span>
                <div class="dropdown-content">
                    <a href="about.html">📜 ABOUT</a>
                    <a href="status.html">📊 STATUS</a>
                    <a href="privacy-policy.html">🔐 PRIVACY</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="games-header">
        <h2>⚙️ GAME VAULT</h2>
        <p>Browse 400+ playable titles across all categories</p>
    </div>

    <div style="max-width: 1400px; margin: 0 auto; padding: 0 15px;">
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Search games...">
            <div class="filter-section">
                <button class="filter-btn active" onclick="filterCategory('all')">ALL GAMES</button>
                <button class="filter-btn" onclick="filterCategory('fnaf')">👻 HORROR</button>
                <button class="filter-btn" onclick="filterCategory('strategy')">🎯 STRATEGY</button>
                <button class="filter-btn" onclick="filterCategory('action')">⚔️ ACTION</button>
                <button class="filter-btn" onclick="filterCategory('puzzle')">🧩 PUZZLE</button>
                <button class="filter-btn" onclick="filterCategory('rhythm')">🎵 RHYTHM</button>
            </div>
            <div class="game-count"><span id="gameCount">0</span> games loaded</div>
        </div>

        <div class="games-grid" id="gamesGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                <p style="color: rgba(188, 19, 254, 0.6);">⏳ Initializing game library...</p>
            </div>
        </div>

        <div id="noResults" class="no-results" style="display: none;">
            ❌ No games found matching your criteria
        </div>
    </div>

    <footer>
        &copy; 2026 AVUIX TERMINAL // GAMES_V4.0
    </footer>

    <script>
        const API_URLS = [
            'https://api.github.com/repos/Avuix/avuix/contents/games',
            'https://api.github.com/repos/Avuix/avuix/contents/games2',
            'https://api.github.com/repos/Avuix/avuix/contents/games3'
        ];

        const categoryKeywords = {
            fnaf: ['fnaf', 'five', 'nights', 'freddy', 'horror'],
            action: ['cod', 'black', 'ops', 'shoot', 'war', 'combat'],
            strategy: ['tag', 'puzzle', 'chess', 'mind'],
            puzzle: ['1', 'zuma', 'match', 'block', 'solve'],
            rhythm: ['osу', 'rhythm', 'beat', 'music', 'quaver'],
        };

        let allGames = [];
        let filteredGames = [];
        let currentFilter = 'all';

        function categorizeGame(gameName) {
            const name = gameName.toLowerCase();
            for (const [category, keywords] of Object.entries(categoryKeywords)) {
                if (keywords.some(keyword => name.includes(keyword))) {
                    return category;
                }
            }
            return 'other';
        }

        function getGameIcon(category) {
            const icons = {
                fnaf: '👻',
                action: '⚔️',
                strategy: '🎯',
                puzzle: '🧩',
                rhythm: '🎵',
                other: '🎮'
            };
            return icons[category] || '🎮';
        }

        async function loadAllGames() {
            try {
                const gamesGrid = document.getElementById('gamesGrid');
                gamesGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;"><p style="color: rgba(188, 19, 254, 0.6);">⏳ Loading 400+ games...</p></div>';

                const allGamesList = {};

                for (const url of API_URLS) {
                    try {
                        const response = await fetch(url);
                        const files = await response.json();
                        
                        files
                            .filter(file => file.name.endsWith('.html'))
                            .forEach(file => {
                                const gameName = file.name.replace(/\.html$/i, '').replace(/^cl/i, '').toUpperCase();
                                if (!allGamesList[gameName]) {
                                    allGamesList[gameName] = {
                                        name: gameName,
                                        file: `../${url.split('contents/')[1]}/${file.name}`,
                                        category: categorizeGame(gameName),
                                        icon: ''
                                    };
                                }
                            });
                    } catch (error) {
                        console.error(`Error loading from ${url}:`, error);
                    }
                }

                allGames = Object.values(allGamesList)
                    .map(game => ({
                        ...game,
                        icon: getGameIcon(game.category)
                    }))
                    .sort((a, b) => a.name.localeCompare(b.name));

                document.getElementById('gameCount').textContent = allGames.length;
                renderGames(allGames);
            } catch (error) {
                console.error('Failed to load games:', error);
                document.getElementById('gamesGrid').innerHTML = '<div style="grid-column: 1/-1; color: #ff3333;">Failed to load games. Please refresh the page.</div>';
            }
        }

        function renderGames(gamesToShow = allGames) {
            const gamesGrid = document.getElementById('gamesGrid');
            const noResults = document.getElementById('noResults');

            if (gamesToShow.length === 0) {
                gamesGrid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            gamesGrid.innerHTML = gamesToShow.map(game => `
                <a href="${game.file}" class="game-card" title="${game.name}">
                    <span class="game-category-tag">${game.category}</span>
                    <span class="game-title">${game.icon} ${game.name}</span>
                </a>
            `).join('');
        }

        function filterCategory(category) {
            currentFilter = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'all') {
                filteredGames = allGames;
            } else {
                filteredGames = allGames.filter(game => game.category === category);
            }

            renderGames(filteredGames);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const gamesToSearch = currentFilter === 'all' ? allGames : filteredGames;
            const filtered = gamesToSearch.filter(game => 
                game.name.toLowerCase().includes(searchTerm)
            );
            renderGames(filtered);
        });

        loadAllGames();
    </script>
</body>
</html>
