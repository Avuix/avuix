<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVUIX | Games Hub</title>
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 30px;
            padding: 0 15px;
            width: 100%;
            max-width: 1400px;
        }

        .game-card {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.15), rgba(188, 19, 254, 0.05));
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .game-card:hover {
            background: linear-gradient(135deg, rgba(188, 19, 254, 0.3), rgba(188, 19, 254, 0.15));
            border-color: rgba(188, 19, 254, 0.6);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            transform: translateY(-5px);
        }

        .game-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.2;
            word-break: break-word;
        }

        .search-container {
            margin: 20px 0;
            text-align: center;
        }

        #searchInput {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.4);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            width: 280px;
            max-width: 90%;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(188, 19, 254, 0.7);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        #searchInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1rem;
        }

        .game-count {
            color: rgba(188, 19, 254, 0.7);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 20px;
            color: rgba(188, 19, 254, 0.6);
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 8px;
                padding: 0 10px;
            }

            #searchInput {
                width: 85%;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">GAMES</h1>
        <nav>
            <a href="../index.html">HOME</a>
            <a href="about.html">ABOUT</a>
            <a href="hub.html" style="color: white; text-shadow: 0 0 10px var(--purple);">GAMES</a>
            <a href="proxies.html">PROXIES</a>
            
            <div class="dropdown">
                <span class="dropbtn">MORE ▾</span>
                <div class="dropdown-content">
                    <a href="status.html">STATUS</a>
                    <a href="privacy-policy.html">PRIVACY</a>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <div class="section">
            <h2>🎮 COMPLETE GAME LIBRARY</h2>
            <p>Browse all available games across all collections. Click to play.</p>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search games...">
                <div class="game-count"><span id="gameCount">0</span> games available</div>
            </div>

            <div class="games-grid" id="gamesGrid">
                <div class="loading">Loading games...</div>
            </div>

            <div id="noResults" class="no-results" style="display: none;">
                No games found. Try a different search.
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 AVUIX TERMINAL // GAMES_V3.0
    </footer>

    <script>
        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const gameCount = document.getElementById('gameCount');
        let allGames = [];

        async function loadGamesFromFolder(folderName) {
            try {
                const API_URL = `https://api.github.com/repos/Avuix/avuix/contents/${folderName}`;
                const response = await fetch(API_URL);
                const files = await response.json();
                
                return files
                    .filter(file => file.name.endsWith('.html'))
                    .map(file => ({
                        name: file.name.replace(/\.html$/i, '').replace(/^cl/i, '').toUpperCase(),
                        folder: folderName,
                        file: `../${folderName}/${file.name}`
                    }));
            } catch (error) {
                console.error(`Failed to load games from ${folderName}:`, error);
                return [];
            }
        }

        async function loadAllGames() {
            try {
                const folders = ['games', 'games2', 'games3'];
                const allGamesArrays = await Promise.all(
                    folders.map(folder => loadGamesFromFolder(folder))
                );

                // Flatten and remove duplicates
                allGames = [...new Set(allGamesArrays.flat())]
                    .sort((a, b) => a.name.localeCompare(b.name));

                gameCount.textContent = allGames.length;
                renderGames(allGames);
            } catch (error) {
                console.error('Failed to load games:', error);
                gamesGrid.innerHTML = '<div class="loading" style="color: #ff3333;">Failed to load games. Please refresh.</div>';
            }
        }

        function renderGames(gamesToShow = allGames) {
            gamesGrid.innerHTML = '';
            
            if (gamesToShow.length === 0) {
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            gamesToShow.forEach(game => {
                const gameCard = document.createElement('a');
                gameCard.href = game.file;
                gameCard.className = 'game-card';
                gameCard.title = `${game.name} (${game.folder})`;
                gameCard.innerHTML = `<span class="game-card-title">${game.name}</span>`;
                gamesGrid.appendChild(gameCard);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allGames.filter(game => 
                game.name.toLowerCase().includes(searchTerm)
            );
            renderGames(filtered);
        });

        loadAllGames();
    </script>
</body>
</html>
