<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVUIX | About Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <style>
        :root {
            --purple: #bc13fe;
            --dark-bg: #050208;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(188, 19, 254, 0.3);
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            background: radial-gradient(circle at top, #1a0b2e 0%, #050208 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin-top: 10vh;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--purple);
            letter-spacing: 5px;
        }

        p {
            line-height: 1.8;
            color: #ccc;
        }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: var(--purple);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ABOUT AVUIX</h1>
        <p>Avuix was founded by a team of dedicated developers (and computer nerds) who believe in a free, fast, and unrestricted internet.</p>
        <p>Our mission is to provide high-quality browser entertainment without the lag or the bloat of traditional gaming sites.</p>
        <a href="index.html" class="back-link"><- BACK TO SYSTEM</a>
    </div>
</body>
</html>
